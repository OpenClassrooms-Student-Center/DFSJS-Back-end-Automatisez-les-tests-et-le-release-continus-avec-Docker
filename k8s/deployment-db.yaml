apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-organizer-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workshop-organizer-db
  template:
    metadata:
      labels:
        app: workshop-organizer-db
    spec:
      containers:
      - name: workshop-organizer-db
      # TODO: add mongo image
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: workshop-organizer-db-secret
              key: username
        # TODO: add the mongo password variable
        - name: MONGO_INITDB_DATABASE
          value: workshopsdb
        ports:
        - containerPort: 27017
